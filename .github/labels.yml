# Source of truth for repo labels. The labels workflow syncs these on change
# (crazy-max/ghaction-github-labeler). Edit here, not in the GitHub UI.
- name: bug
  color: d73a4a
  description: Something isn't working

- name: enhancement
  color: a2eeef
  description: New feature or request

- name: documentation
  color: 0075ca
  description: Docs and comments

- name: question
  color: d876e3
  description: Further information is requested

- name: good first issue
  color: 7057ff
  description: Good for newcomers

- name: help wanted
  color: 008672
  description: Extra attention is welcome

- name: dependencies
  color: 0366d6
  description: Dependency or toolchain updates

- name: duplicate
  color: cfd3d7
  description: This already exists

- name: wontfix
  color: ffffff
  description: This will not be worked on

- name: invalid
  color: e4e669
  description: Not valid / not reproducible
